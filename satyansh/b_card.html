<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business card</title>
    <style>
        .profile-img{
            width:200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin: 15px 0;
        }
        body{
            background-color: gray;
        }
        .container{
            background-color: white;
            width: 75%;
            margin: 40px auto;
            max-width: fit-content;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        h1{
            font-size: 22px;
            margin: 15px 0 5px;
        }
        p{
            color: gray;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .btn{
            padding: 10px 15px;
            margin: 5px;
            border: double;
            border-radius: 10px;
            border-color: grey;
            cursor: pointer;
            font-size: 15px;
            background-color: azure;
        }
        a{
            color:black;
            text-decoration: none;
        }
        .btn:hover{
            background-color: bisque;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Satyaansh Softech Pvt. Ltd.</h1>
        <img src="image.png" alt="satyaansh founder" class="profile-img">

        <h1>Mr. Satyawan Panchal</h1>
        <p>Founder & CEO</p>
        <p>Web Developer |Corporate Trainer</p>
        <button class="btn">
            <a href="https://www.instagram.com/satyaanshsoftech?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==">Instagram</a>
        </button>
        <button class="btn">
            <a href="https://www.youtube.com/@satyaanshsoftechpvtltd">Youtube</a>
        </button>
        <p>Contact: +91-7082252235</p>
    </div>
</body>
</html>
