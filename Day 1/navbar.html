<!doctype html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>SSPL | Arya P.G.</title>
   <link rel="stylesheet" href="style.css" />
</head>

<body>
   <div class="container">
      <!-- Navbar -->
      <div class="navbar">
         <!-- logo -->
         <div class="logo">
            <img src="A-logo.png" alt="logo" />
            <div class="companyName">
               <span> Homedecor_panipat_</span>
               A complete Home decor solution
            </div>
         </div>

         <!-- Menu-Items -->
         <ul class="daysLink">
             <li>Topic 1</li>
            <li>Topic 2</li>
            <li>Topic 3</li>
            <li>Topic 4</li>
            <li>Topic 5</li>
         </ul>

         <!-- right button -->
         <button class="hamburger">
            <img src="hambuger.png" alt="menu" />
         </button>
      </div>
   </div>

   <script>
      const hamburger = document.querySelector(".hamburger");
      const daysLink = document.querySelector(".daysLink");

      hamburger.addEventListener("click", () => {
         daysLink.classList.toggle("active");
      });

      function loadPage(page) {
         let frame = document.getElementById("dayFrame")
         frame.src = page;
      }
   </script>
</body>

</html>
