<!doctype html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>SSPL | Arya P.G.</title>
   <link rel="stylesheet" href="style.css" />
</head>

<body>
   <!--intro video-->
   <div id="intro">
      <video id="intro_video" autoplay muted playsinline>
         <source src="sslogo.mp4" type="video/mp4">
      </video>
   </div>

   <div id="main" class="container">
      <!-- Navbar -->
      <div class="navbar">
         <!-- logo -->
         <div class="logo">
            <img src="ss.png" alt="logo" />
            <div class="companyName">
               <span> Satyaansh softech</span>
               Provide wings to Your Dreams
            </div>
         </div>

         <!-- Menu-Items -->
         <ul class="daysLink">
            <li onclick="loadPage('Day 1/navbar.html')">Task 1</li>
            <li onclick="loadPage('Day 2/b_card1.html')">Task 2</li>
            <li onclick="loadPage('calculation/add_alert.html')">Task 3</li>            
            <li onclick="loadPage('Day 3/resume.html')">Task 4</li>
            <li onclick="loadPage('june 23/productcard.html')">Task 5</li>
            <li onclick="loadPage('june 24/card.html')">Task 6</li>
            <li onclick="loadPage('june 25/p_card.html')">Task 7</li>
            <li onclick="loadPage('june 30/index.html')">Task 8</li>
            <li onclick="loadPage('july 6/index.html')">Task 9</li>
            <li onclick="loadPage('july1/index.html')">Task 10</li>

         </ul>

         <!-- right button -->
         <button class="hamburger">
            <img src="hambuger.png" alt="menu" />
         </button>
      </div>

      <iframe
         id="dayFrame"
         src="Day 3/resume.html"
         width="100%"
         height="600"
         frameborder="0">
      </iframe>
   </div>

   <script>
      const hamburger = document.querySelector(".hamburger");
      const daysLink = document.querySelector(".daysLink");

      hamburger.addEventListener("click", () => {
         daysLink.classList.toggle("active");
      });

      function loadPage(page) {
         let frame = document.getElementById("dayFrame")
         frame.src = page;
      }
      const intro = document.getElementById("intro");
      const main = document.getElementById("main");
      const video = document.getElementById("intro_video");
      video.onended = function () {
      intro.style.display = "none";
      main.style.display = "block";
};
   </script>
</body>

</html>
